<main>
    <h1>Ways to Contact Me:</h1>
    <h2>Email:</h2>
    <form id ="contactForm" action="https://formspree.io" method="POST">
        <label for="username">Name:</label>
        <input type="text" id="userName" name="name" required>

        <label for="userEmail">Email:</label>
        <input type="email" id="userEmail" name="email" required>

        <label for="userMessage">Message:</label>
        <textarea id="userMessage" name="message" required></textarea>

        <button class="email-submit" type="submit">Send Email</button>

        <div id="responseMessage"></div>
    </form>
    <h2>Other Ways:</h2>
    <p><strong>Phone:</strong> 812-453-9434</p>
</main>
<footer>
    <p>&copy; 2026 Nathaniel Pudleiner</p>
</footer>
<script>
    // 1. Grabbing form element
    const contactForm = document.getElementById('contactForm');
    const responseDisplay = document.getElementById('responseMessage');

    // 2. Event for submitting
    contactForm.addEventListener('submit', function(event) {
        // Stopping page from refreshing
        event.preventDefault();

        // 3. Extract the data from form
        const formData = new FormData(contactForm);
        const name = formData.get('name');
        const email = formData.get('email');

        // 4. Processing logic
        console.log("Form Submitted!", {name, email});

        //Updatting UI for success
        responseDisplay.textContent = `Message Sent!`;

        // Clearing Form
        contactForm.reset();
    });
</script>
